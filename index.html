<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Familiares</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      gap: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 1.75rem;
    }

    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, select {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9375rem;
      color: #2d3748;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4c6ef5;
      box-shadow: 0 0 0 3px rgba(76,110,245,0.12);
    }

    .monto-wrap { position: relative; }
    .monto-wrap span {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: #718096;
      font-weight: 600;
      pointer-events: none;
    }
    .monto-wrap input { padding-left: 2rem; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #4c6ef5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover   { background: #3b5bdb; }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }

    #mensaje {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    #mensaje.ok    { background: #c6f6d5; color: #276749; display: block; }
    #mensaje.error { background: #fed7d7; color: #9b2c2c; display: block; }

    /* ── Tabla de historial ── */
    .historial-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 1.5rem;
      width: 100%;
      max-width: 900px;
    }

    .historial-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .historial-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
    }

    .btn-reload {
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-reload:hover { background: #f7fafc; }

    .tabla-wrap {
      overflow-y: auto;
      max-height: 320px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f7fafc;
      padding: 0.6rem 0.875rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #4a5568;
      border-bottom: 1.5px solid #e2e8f0;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #edf2f7; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7fafc; }

    tbody td {
      padding: 0.6rem 0.875rem;
      color: #2d3748;
      white-space: nowrap;
    }

    .monto-num { text-align: right; font-variant-numeric: tabular-nums; }

    .estado-cargando, .estado-vacio, .estado-error {
      text-align: center;
      padding: 2rem;
      color: #718096;
      font-size: 0.875rem;
    }
    .estado-error { color: #9b2c2c; }
  </style>
</head>
<body>

  <!-- Formulario -->
  <div class="card">
    <h1>Gastos Familiares</h1>
    <p class="subtitle">Registrá un nuevo gasto del hogar</p>

    <form id="gastoForm" novalidate>

      <div class="field">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" name="fecha" required />
      </div>

      <div class="field">
        <label for="descripcion">Descripción</label>
        <input type="text" id="descripcion" name="descripcion"
               placeholder="Ej: Supermercado Día" maxlength="200" required />
      </div>

      <div class="field">
        <label for="categoria">Categoría</label>
        <select id="categoria" name="categoria" required>
          <option value="" disabled selected>Seleccioná una categoría</option>
          <option value="Alimentación">Alimentación</option>
          <option value="Transporte">Transporte</option>
          <option value="Salud">Salud</option>
          <option value="Educación">Educación</option>
          <option value="Servicios">Servicios</option>
          <option value="Ropa">Ropa</option>
          <option value="Entretenimiento">Entretenimiento</option>
          <option value="Hogar">Hogar</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <div class="field">
        <label for="monto">Monto</label>
        <div class="monto-wrap">
          <span>$</span>
          <input type="number" id="monto" name="monto"
                 placeholder="0.00" min="0" step="0.01" required />
        </div>
      </div>

      <div class="field">
        <label for="quien">¿Quién pagó?</label>
        <select id="quien" name="quien" required>
          <option value="" disabled selected>Seleccioná una persona</option>
          <option value="Joaco">Joaco</option>
          <option value="Agus">Agus</option>
        </select>
      </div>

      <button type="submit" class="btn" id="btnEnviar">Registrar gasto</button>
      <div id="mensaje"></div>
    </form>
  </div>

  <!-- Historial -->
  <div class="historial-card">
    <div class="historial-header">
      <h2>Historial de gastos</h2>
      <button class="btn-reload" id="btnRecargar">Actualizar</button>
    </div>
    <div class="tabla-wrap" id="tablaWrap">
      <p class="estado-cargando">Cargando…</p>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgH0t0cbO4juI-YBh1v8FvX24pM9X4KY_v2SOUvTRC0hVHoh4rG433wiTRNMysP4hQGw/exec";

    document.getElementById("fecha").valueAsDate = new Date();

    // ── Formateo ──────────────────────────────────────────────
    function fmtMonto(val) {
      const n = parseFloat(val);
      if (isNaN(n)) return "-";
      return "$ " + n.toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtFecha(val) {
      if (!val) return "-";
      // val puede ser "2026-03-29" o un Date serializado
      const s = String(val).substring(0, 10);
      const [y, m, d] = s.split("-");
      return `${d}/${m}/${y}`;
    }

    // ── Cargar historial ──────────────────────────────────────
    async function cargarHistorial() {
      const wrap = document.getElementById("tablaWrap");
      wrap.innerHTML = '<p class="estado-cargando">Cargando…</p>';
      try {
        const res  = await fetch(APPS_SCRIPT_URL);
        const rows = await res.json();

        if (!rows.length) {
          wrap.innerHTML = '<p class="estado-vacio">Sin registros aún.</p>';
          return;
        }

        const cols = [
          { key: "Fecha",               fmt: fmtFecha,  num: false },
          { key: "Descripción",         fmt: v => v,    num: false },
          { key: "Categoría",           fmt: v => v,    num: false },
          { key: "Monto Total",         fmt: fmtMonto,  num: true  },
          { key: "Moneda",              fmt: v => v,    num: false },
          { key: "Pagado por",          fmt: v => v,    num: false },
          { key: "Mi parte",            fmt: fmtMonto,  num: true  },
          { key: "Parte otra persona",  fmt: fmtMonto,  num: true  },
        ];

        let html = "<table><thead><tr>";
        cols.forEach(c => { html += `<th>${c.key}</th>`; });
        html += "</tr></thead><tbody>";

        rows.forEach(row => {
          html += "<tr>";
          cols.forEach(c => {
            const cls = c.num ? ' class="monto-num"' : "";
            html += `<td${cls}>${c.fmt(row[c.key] ?? "")}</td>`;
          });
          html += "</tr>";
        });

        html += "</tbody></table>";
        wrap.innerHTML = html;
      } catch (err) {
        wrap.innerHTML = '<p class="estado-error">No se pudo cargar el historial.</p>';
      }
    }

    // ── Envío del formulario ──────────────────────────────────
    document.getElementById("gastoForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const form = e.target;
      const btn  = document.getElementById("btnEnviar");
      const msg  = document.getElementById("mensaje");

      if (!form.checkValidity()) { form.reportValidity(); return; }

      const data = {
        fecha:       document.getElementById("fecha").value,
        descripcion: document.getElementById("descripcion").value.trim(),
        categoria:   document.getElementById("categoria").value,
        monto:       parseFloat(document.getElementById("monto").value),
        quien:       document.getElementById("quien").value,
      };

      btn.disabled    = true;
      btn.textContent = "Enviando…";
      msg.className   = "";
      msg.style.display = "none";

      try {
        await fetch(APPS_SCRIPT_URL, {
          method:  "POST",
          mode:    "no-cors",
          headers: { "Content-Type": "text/plain" },
          body:    JSON.stringify(data),
        });

        msg.textContent = "Gasto registrado correctamente.";
        msg.className   = "ok";
        form.reset();
        document.getElementById("fecha").valueAsDate = new Date();

        // Esperar un momento para que el sheet se actualice antes de recargar
        setTimeout(cargarHistorial, 1500);
      } catch (err) {
        msg.textContent = "Error al enviar. Revisá tu conexión e intentá de nuevo.";
        msg.className   = "error";
      } finally {
        btn.disabled    = false;
        btn.textContent = "Registrar gasto";
      }
    });

    document.getElementById("btnRecargar").addEventListener("click", cargarHistorial);

    // Carga inicial
    cargarHistorial();
  </script>
</body>
</html>
