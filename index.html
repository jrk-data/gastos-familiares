<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Familiares</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, select, textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9375rem;
      color: #2d3748;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4c6ef5;
      box-shadow: 0 0 0 3px rgba(76,110,245,0.12);
    }

    .monto-wrap {
      position: relative;
    }

    .monto-wrap span {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: #718096;
      font-weight: 600;
      pointer-events: none;
    }

    .monto-wrap input {
      padding-left: 2rem;
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #4c6ef5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover  { background: #3b5bdb; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }

    #mensaje {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    #mensaje.ok    { background: #c6f6d5; color: #276749; display: block; }
    #mensaje.error { background: #fed7d7; color: #9b2c2c; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gastos Familiares</h1>
    <p class="subtitle">Registrá un nuevo gasto del hogar</p>

    <form id="gastoForm" novalidate>

      <div class="field">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" name="fecha" required />
      </div>

      <div class="field">
        <label for="descripcion">Descripción</label>
        <input type="text" id="descripcion" name="descripcion"
               placeholder="Ej: Supermercado Día" maxlength="200" required />
      </div>

      <div class="field">
        <label for="categoria">Categoría</label>
        <select id="categoria" name="categoria" required>
          <option value="" disabled selected>Seleccioná una categoría</option>
          <option value="Alimentación">Alimentación</option>
          <option value="Transporte">Transporte</option>
          <option value="Salud">Salud</option>
          <option value="Educación">Educación</option>
          <option value="Servicios">Servicios</option>
          <option value="Ropa">Ropa</option>
          <option value="Entretenimiento">Entretenimiento</option>
          <option value="Hogar">Hogar</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <div class="field">
        <label for="monto">Monto</label>
        <div class="monto-wrap">
          <span>$</span>
          <input type="number" id="monto" name="monto"
                 placeholder="0.00" min="0" step="0.01" required />
        </div>
      </div>

      <div class="field">
        <label for="quien">¿Quién pagó?</label>
        <select id="quien" name="quien" required>
          <option value="" disabled selected>Seleccioná una persona</option>
          <option value="Mamá">Mamá</option>
          <option value="Papá">Papá</option>
          <option value="Joaco">Joaco</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <button type="submit" class="btn" id="btnEnviar">Registrar gasto</button>
      <div id="mensaje"></div>
    </form>
  </div>

  <script>
    // REEMPLAZÁ esta URL con la de tu Google Apps Script publicado
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/TU_ID_AQUI/exec";

    // Completar la fecha de hoy por defecto
    document.getElementById("fecha").valueAsDate = new Date();

    document.getElementById("gastoForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const form   = e.target;
      const btn    = document.getElementById("btnEnviar");
      const msg    = document.getElementById("mensaje");

      // Validación básica
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const data = {
        fecha:       document.getElementById("fecha").value,
        descripcion: document.getElementById("descripcion").value.trim(),
        categoria:   document.getElementById("categoria").value,
        monto:       parseFloat(document.getElementById("monto").value),
        quien:       document.getElementById("quien").value,
      };

      btn.disabled    = true;
      btn.textContent = "Enviando…";
      msg.className   = "";
      msg.style.display = "none";

      try {
        // Google Apps Script requiere no-cors para evitar el error de CORS
        await fetch(APPS_SCRIPT_URL, {
          method:  "POST",
          mode:    "no-cors",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify(data),
        });

        // Con no-cors no podemos leer la respuesta, así que asumimos éxito
        msg.textContent = "Gasto registrado correctamente.";
        msg.className   = "ok";
        form.reset();
        document.getElementById("fecha").valueAsDate = new Date();
      } catch (err) {
        msg.textContent = "Error al enviar. Revisá tu conexión e intentá de nuevo.";
        msg.className   = "error";
      } finally {
        btn.disabled    = false;
        btn.textContent = "Registrar gasto";
      }
    });
  </script>
</body>
</html>
