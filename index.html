<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Familiares</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    /* ── Shell ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 1.5px solid #e2e8f0;
      flex-shrink: 0;
      z-index: 10;
    }

    .tab {
      flex: 1;
      padding: 0.875rem 0.5rem;
      border: none;
      border-bottom: 2.5px solid transparent;
      background: transparent;
      font-size: 0.875rem;
      font-weight: 600;
      color: #718096;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .tab.active { color: #4c6ef5; border-bottom-color: #4c6ef5; }
    .tab:hover:not(.active) { color: #4a5568; background: #f7fafc; }

    /* ── Slides ── */
    .slides-viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .slides-track {
      display: flex;
      width: 400%;
      height: 100%;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slides-track.no-transition { transition: none; }

    .slide {
      width: calc(100% / 4);
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      gap: 1.5rem;
    }

    .slide-chart { overflow-y: auto; }

    /* ── Formulario ── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 1.75rem;
    }

    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, select {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9375rem;
      color: #2d3748;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4c6ef5;
      box-shadow: 0 0 0 3px rgba(76,110,245,0.12);
    }

    .monto-wrap { position: relative; }
    .monto-wrap span {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: #718096;
      font-weight: 600;
      pointer-events: none;
    }
    .monto-wrap input { padding-left: 2rem; }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: #4c6ef5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover   { background: #3b5bdb; }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }

    #mensaje {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    #mensaje.ok    { background: #c6f6d5; color: #276749; display: block; }
    #mensaje.error { background: #fed7d7; color: #9b2c2c; display: block; }

    /* ── Gráfico ── */
    .chart-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 1.5rem;
      width: 100%;
      max-width: 900px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .chart-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
    }

    .periodo-select {
      width: auto;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      color: #4a5568;
      background: #fff;
      cursor: pointer;
    }

    .chart-wrap {
      flex: 1;
      min-height: 150px;
      position: relative;
    }

    .chart-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #718096;
      font-size: 0.875rem;
    }

    .btn-reset-zoom {
      background: none;
      border: 1.5px solid #4c6ef5;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #4c6ef5;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-reset-zoom:hover { background: #ebf4ff; }

    .day-detail {
      border-top: 1.5px solid #e2e8f0;
      padding-top: 0.875rem;
      margin-top: 0.5rem;
      flex-shrink: 0;
    }

    .day-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .day-detail-title {
      font-size: 0.875rem;
      font-weight: 700;
      color: #1a202c;
    }

    .day-detail-close {
      background: none;
      border: none;
      color: #718096;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0.15rem 0.3rem;
    }
    .day-detail-close:hover { color: #2d3748; }

    .day-detail-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .day-detail-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8125rem;
      color: #4a5568;
      background: #f7fafc;
      border-radius: 6px;
      padding: 0.25rem 0.625rem;
    }

    .day-detail-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .day-detail-total {
      font-size: 0.875rem;
      font-weight: 700;
      color: #1a202c;
      background: #edf2f7;
      border-radius: 6px;
      padding: 0.25rem 0.625rem;
    }

    /* ── Historial ── */
    .historial-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 1.5rem;
      width: 100%;
      max-width: 900px;
    }

    .historial-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .historial-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
    }

    .btn-reload {
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-reload:hover { background: #f7fafc; }

    .tabla-wrap {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 420px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f7fafc;
      padding: 0.6rem 0.875rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #4a5568;
      border-bottom: 1.5px solid #e2e8f0;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #edf2f7;
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover  { background: #ebf4ff; }
    tbody tr:active { background: #dbeafe; }
    tbody tr.selected { background: #ebf4ff; outline: 2px solid #4c6ef5; outline-offset: -2px; }

    tbody td {
      padding: 0.6rem 0.875rem;
      color: #2d3748;
      white-space: nowrap;
    }

    .monto-num { text-align: right; font-variant-numeric: tabular-nums; }

    .estado-cargando, .estado-vacio, .estado-error {
      text-align: center;
      padding: 2rem;
      color: #718096;
      font-size: 0.875rem;
    }
    .estado-error { color: #9b2c2c; }

    /* ── Modal de edición ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      transition: background 0.22s;
    }

    .modal-overlay.open {
      display: flex;
      background: rgba(0,0,0,0.45);
    }

    .modal {
      background: #fff;
      border-radius: 18px 18px 0 0;
      padding: 1.5rem;
      width: 100%;
      max-width: 500px;
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
      .modal {
        border-radius: 16px;
        transform: translateY(16px);
        max-height: 85vh;
      }
      .modal-overlay.open .modal { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .modal-header h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a202c;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #718096;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
    }
    .modal-close:hover { color: #2d3748; }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }

    .btn-danger {
      flex: 1;
      padding: 0.75rem;
      background: #fff;
      color: #e53e3e;
      border: 1.5px solid #e53e3e;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-danger:hover { background: #fff5f5; }
    .btn-danger.confirming {
      background: #e53e3e;
      color: #fff;
    }

    .btn-save {
      flex: 1;
      padding: 0.75rem;
      background: #4c6ef5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #3b5bdb; }
    .btn-save:disabled { background: #a0aec0; cursor: not-allowed; }

    /* ── Tarjeta total del mes ── */
    .total-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 1.25rem 1.5rem;
      width: 100%;
      max-width: 900px;
      flex-shrink: 0;
    }

    .total-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .total-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
    }

    .total-monto {
      font-size: 1.75rem;
      font-weight: 800;
      color: #4c6ef5;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .total-breakdown {
      display: flex;
      gap: 1.5rem;
    }

    .total-persona {
      display: flex;
      flex-direction: column;
      font-size: 0.8125rem;
      color: #718096;
    }

    .total-persona-nombre {
      font-weight: 700;
      color: #4a5568;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }

    .total-persona-monto {
      font-size: 0.9375rem;
      color: #2d3748;
      font-weight: 600;
    }

    /* ── Balance ── */
    .balance-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 1.5rem;
      width: 100%;
      max-width: 640px;
    }

    .balance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .balance-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
    }

    .bal-total-label {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 1.25rem;
    }

    .bal-total-label strong {
      color: #2d3748;
    }

    .bal-personas {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .bal-persona {
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem;
    }

    .bal-persona-nombre {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .bal-porcentaje {
      font-size: 0.75rem;
      font-weight: 600;
      background: #edf2f7;
      color: #718096;
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
    }

    .bal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8125rem;
      color: #718096;
      padding: 0.25rem 0;
      border-bottom: 1px solid #f7fafc;
    }

    .bal-row:last-child { border-bottom: none; }

    .bal-row span:last-child {
      font-weight: 600;
      color: #2d3748;
      font-variant-numeric: tabular-nums;
    }

    .bal-dif { font-weight: 700 !important; }
    .bal-dif.favor  { color: #276749 !important; }
    .bal-dif.contra { color: #c53030 !important; }

    .bal-resumen {
      background: #f7fafc;
      border-radius: 8px;
      padding: 0.875rem 1rem;
      text-align: center;
      font-size: 0.9375rem;
      color: #4a5568;
    }

    .bal-resumen strong { font-weight: 700; }
    .bal-resumen.joaco-debe { background: #fff5f5; color: #c53030; }
    .bal-resumen.agus-debe  { background: #ebf8ff; color: #2b6cb0; }
    .bal-resumen.al-dia     { background: #f0fff4; color: #276749; }

    .btn-conciliar {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: #fff;
      color: #4c6ef5;
      border: 1.5px solid #4c6ef5;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-conciliar:hover { background: #ebf4ff; }
    .btn-conciliar.confirming {
      background: #4c6ef5;
      color: #fff;
    }
    .btn-conciliar:disabled { opacity: 0.5; cursor: not-allowed; }

    tbody tr.conciliacion td { color: #a0aec0; font-style: italic; }
  </style>
</head>
<body>
<div class="app">

  <!-- Tabs -->
  <nav class="tabs">
    <button class="tab active" data-idx="0">Registrar</button>
    <button class="tab"        data-idx="1">Gráfico</button>
    <button class="tab"        data-idx="2">Historial</button>
    <button class="tab"        data-idx="3">Balance</button>
  </nav>

  <!-- Slides -->
  <div class="slides-viewport" id="slidesViewport">
    <div class="slides-track" id="slidesTrack">

      <!-- Slide 0: Formulario -->
      <div class="slide">
        <div class="card">
          <h1>Gastos Familiares</h1>
          <p class="subtitle">Registrá un nuevo gasto del hogar</p>
          <form id="gastoForm" novalidate>
            <div class="field">
              <label for="fecha">Fecha</label>
              <input type="date" id="fecha" name="fecha" required />
            </div>
            <div class="field">
              <label for="descripcion">Descripción</label>
              <input type="text" id="descripcion" name="descripcion"
                     placeholder="Ej: Supermercado Día" maxlength="200" required />
            </div>
            <div class="field">
              <label for="categoria">Categoría</label>
              <select id="categoria" name="categoria" required>
                <option value="" disabled selected>Seleccioná una categoría</option>
                <option value="Alimentación">Alimentación</option>
                <option value="Transporte">Transporte</option>
                <option value="Salud">Salud</option>
                <option value="Educación">Educación</option>
                <option value="Servicios">Servicios</option>
                <option value="Ropa">Ropa</option>
                <option value="Entretenimiento">Entretenimiento</option>
                <option value="Hogar">Hogar</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
            <div class="field">
              <label for="monto">Monto</label>
              <div class="monto-wrap">
                <span>$</span>
                <input type="number" id="monto" name="monto"
                       placeholder="0.00" min="0" step="0.01" required />
              </div>
            </div>
            <div class="field">
              <label for="quien">¿Quién pagó?</label>
              <select id="quien" name="quien" required>
                <option value="" disabled selected>Seleccioná una persona</option>
                <option value="Joaco">Joaco</option>
                <option value="Agus">Agus</option>
              </select>
            </div>
            <button type="submit" class="btn" id="btnEnviar">Registrar gasto</button>
            <div id="mensaje"></div>
          </form>
        </div>
      </div>

      <!-- Slide 1: Gráfico -->
      <div class="slide slide-chart">
        <div class="total-card">
          <div class="total-header">
            <h2>Total del mes</h2>
            <select id="totalMesSelect" class="periodo-select"></select>
          </div>
          <div class="total-monto" id="totalMonto">—</div>
          <div class="total-breakdown">
            <div class="total-persona">
              <span class="total-persona-nombre">Joaco</span>
              <span class="total-persona-monto" id="totalJoaco">—</span>
            </div>
            <div class="total-persona">
              <span class="total-persona-nombre">Agus</span>
              <span class="total-persona-monto" id="totalAgus">—</span>
            </div>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-header">
            <h2>Gastos por categoría</h2>
            <div style="display:flex;gap:0.5rem;align-items:center">
              <button id="btnResetZoom" class="btn-reset-zoom" style="display:none">↺ Zoom</button>
              <select id="periodoSelect" class="periodo-select">
                <option value="dia">Por día</option>
                <option value="mes">Por mes</option>
              </select>
            </div>
          </div>
          <div class="chart-wrap" id="chartWrap">
            <canvas id="gastosChart"></canvas>
          </div>
          <div id="dayDetail" class="day-detail" style="display:none">
            <div class="day-detail-header">
              <span class="day-detail-title" id="dayDetailTitle"></span>
              <button class="day-detail-close" id="dayDetailClose">✕</button>
            </div>
            <div id="dayDetailList" class="day-detail-list"></div>
          </div>
        </div>
      </div>

      <!-- Slide 2: Historial -->
      <div class="slide">
        <div class="historial-card">
          <div class="historial-header">
            <h2>Historial de gastos</h2>
            <select id="historialMesSelect" class="periodo-select"></select>
            <button class="btn-reload" id="btnRecargar">Actualizar</button>
          </div>
          <div class="tabla-wrap" id="tablaWrap">
            <p class="estado-cargando">Cargando…</p>
          </div>
        </div>
      </div>

      <!-- Slide 3: Balance -->
      <div class="slide">
        <div class="balance-card">
          <div class="balance-header">
            <h2>Balance del mes</h2>
            <select id="balanceMesSelect" class="periodo-select"></select>
          </div>
          <p class="bal-total-label">Total gastado: <strong id="balTotalMes">—</strong></p>
          <div class="bal-personas">
            <div class="bal-persona">
              <div class="bal-persona-nombre">Joaco</div>
              <div class="bal-row"><span>Pagó</span><span id="balJoacoPago">—</span></div>
              <div class="bal-row"><span>Debería pagar</span><span id="balJoacoDeberia">—</span></div>
              <div class="bal-row"><span>Diferencia</span><span id="balJoacoDif" class="bal-dif">—</span></div>
            </div>
            <div class="bal-persona">
              <div class="bal-persona-nombre">Agus</div>
              <div class="bal-row"><span>Pagó</span><span id="balAgusPago">—</span></div>
              <div class="bal-row"><span>Debería pagar</span><span id="balAgusDeberia">—</span></div>
              <div class="bal-row"><span>Diferencia</span><span id="balAgusDif" class="bal-dif">—</span></div>
            </div>
          </div>
          <div id="balResumen" class="bal-resumen"></div>
          <button id="btnConciliar" class="btn-conciliar" style="display:none"></button>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal edición -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3>Editar gasto</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <form id="editForm" novalidate>
        <div class="field">
          <label for="editFecha">Fecha</label>
          <input type="date" id="editFecha" required />
        </div>
        <div class="field">
          <label for="editDescripcion">Descripción</label>
          <input type="text" id="editDescripcion" maxlength="200" required />
        </div>
        <div class="field">
          <label for="editCategoria">Categoría</label>
          <select id="editCategoria" required>
            <option value="Alimentación">Alimentación</option>
            <option value="Transporte">Transporte</option>
            <option value="Salud">Salud</option>
            <option value="Educación">Educación</option>
            <option value="Servicios">Servicios</option>
            <option value="Ropa">Ropa</option>
            <option value="Entretenimiento">Entretenimiento</option>
            <option value="Hogar">Hogar</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div class="field">
          <label for="editMonto">Monto</label>
          <div class="monto-wrap">
            <span>$</span>
            <input type="number" id="editMonto" min="0" step="0.01" required />
          </div>
        </div>
        <div class="field">
          <label for="editQuien">¿Quién pagó?</label>
          <select id="editQuien" required>
            <option value="Joaco">Joaco</option>
            <option value="Agus">Agus</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-danger" id="btnDelete">Eliminar</button>
          <button type="submit" class="btn-save" id="btnSave">Guardar</button>
        </div>
      </form>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script>
  const API_URL   = "/api/gastos";
  const API_TOKEN = "63a448516f04f12276ae0357a89fe37f60a668fd0062d0f88057240fae5420e4";

  document.getElementById("fecha").valueAsDate = new Date();

  // ── Navegación tabs / swipe ───────────────────────────────
  const track    = document.getElementById("slidesTrack");
  const tabs     = document.querySelectorAll(".tab");
  let currentIdx = 0;

  function goTo(idx) {
    currentIdx = Math.max(0, Math.min(3, idx));
    track.style.transform = `translateX(${-currentIdx * (100 / 4)}%)`;
    tabs.forEach((t, i) => t.classList.toggle("active", i === currentIdx));
    if (currentIdx === 1 && rowsGlobal.length) {
      requestAnimationFrame(() => renderChart(rowsGlobal, document.getElementById("periodoSelect").value));
    }
  }

  tabs.forEach(tab => tab.addEventListener("click", () => goTo(+tab.dataset.idx)));

  const vp = document.getElementById("slidesViewport");
  let touchX = 0, touchY = 0, swiping = false, blockSlideSwipe = false;

  vp.addEventListener("touchstart", e => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
    swiping = false;
    // Si el toque empieza dentro de la tabla, no navegar slides
    blockSlideSwipe = !!e.target.closest(".tabla-wrap");
  }, { passive: true });

  vp.addEventListener("touchmove", e => {
    if (blockSlideSwipe) return;
    if (!swiping) {
      const dx = Math.abs(e.touches[0].clientX - touchX);
      const dy = Math.abs(e.touches[0].clientY - touchY);
      if (dx > dy && dx > 8) swiping = true;
    }
    if (swiping) e.preventDefault();
  }, { passive: false });

  vp.addEventListener("touchend", e => {
    if (!swiping || blockSlideSwipe) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 48) goTo(currentIdx + (dx < 0 ? 1 : -1));
    swiping = false;
  });

  // ── Gráfico (canvas puro) ────────────────────────────────
  const CATEGORIAS   = ["Alimentación","Transporte","Salud","Educación","Servicios","Ropa","Entretenimiento","Hogar","Otro"];
  const MESES_CORTOS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const MESES_LARGOS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const COLORES_CAT = {
    "Alimentación":    "#4c6ef5",
    "Transporte":      "#f59f00",
    "Salud":           "#40c057",
    "Educación":       "#fa5252",
    "Servicios":       "#7950f2",
    "Ropa":            "#fd7e14",
    "Entretenimiento": "#15aabf",
    "Hogar":           "#e64980",
    "Otro":            "#868e96",
  };

  let rowsGlobal   = [];
  let chartInstance = null;
  let chartAgrupado = {};

  function renderChart(rows, periodo) {
    rows = rows.filter(r => r["Categoría"] !== "Pago de Saldo");
    const canvas = document.getElementById("gastosChart");
    const wrap   = document.getElementById("chartWrap");
    const old    = wrap.querySelector(".chart-empty");
    if (old) old.remove();
    closeDayDetail();

    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    chartAgrupado = {};
    rows.forEach(row => {
      const fecha = String(row["Fecha"] ?? "").substring(0, 10);
      if (fecha.length < 7) return;
      const [y, m, d] = fecha.split("-");
      const sortKey      = periodo === "dia" ? fecha : `${y}-${m}`;
      const displayLabel = periodo === "dia" ? `${d}/${m}` : `${MESES_CORTOS[+m - 1]} ${y}`;
      const cat   = String(row["Categoría"] || "Otro");
      const monto = parseFloat(row["Monto Total"]) || 0;
      if (!chartAgrupado[sortKey]) chartAgrupado[sortKey] = { displayLabel, cats: {} };
      chartAgrupado[sortKey].cats[cat] = (chartAgrupado[sortKey].cats[cat] || 0) + monto;
    });

    const keys = Object.keys(chartAgrupado).sort();
    if (!keys.length) {
      canvas.style.display = "none";
      document.getElementById("btnResetZoom").style.display = "none";
      const el = document.createElement("p");
      el.className = "chart-empty";
      el.textContent = "Sin datos para mostrar.";
      wrap.appendChild(el);
      return;
    }

    canvas.style.display = "";

    const datasets = CATEGORIAS.map(cat => ({
      label: cat,
      data:  keys.map(k => chartAgrupado[k].cats[cat] || 0),
      backgroundColor: COLORES_CAT[cat],
    }));

    chartInstance = new Chart(canvas, {
      type: "bar",
      data: { labels: keys.map(k => chartAgrupado[k].displayLabel), datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        scales: {
          x: {
            stacked: true,
            ticks: { maxRotation: 90, minRotation: 60, color: "#718096", font: { size: 11 } },
            grid:   { display: false },
          },
          y: {
            stacked: true,
            ticks: {
              color: "#718096",
              font:  { size: 11 },
              callback: v => v >= 1e6 ? `$${(v/1e6).toFixed(1)}M` : v >= 1e3 ? `$${(v/1e3).toFixed(0)}k` : `$${v}`,
            },
            grid: { color: "#e2e8f0" },
          },
        },
        plugins: {
          legend: {
            position: "bottom",
            labels: { boxWidth: 12, boxHeight: 12, padding: 10, color: "#4a5568", font: { size: 11 } },
          },
          tooltip: {
            filter: item => item.parsed.y > 0,
            backgroundColor: "rgba(255,255,255,0.97)",
            borderColor: "#e2e8f0",
            borderWidth: 1,
            titleColor: "#1a202c",
            bodyColor:  "#4a5568",
            footerColor: "#1a202c",
            footerFont:  { weight: "bold" },
            padding: 10,
            callbacks: {
              label:  ctx  => ` ${ctx.dataset.label}: ${fmtMonto(ctx.parsed.y)}`,
              footer: items => `Total: ${fmtMonto(items.reduce((s, c) => s + c.parsed.y, 0))}`,
            },
          },
          zoom: {
            pan: {
              enabled: true,
              mode: "x",
              onPanComplete: () => { document.getElementById("btnResetZoom").style.display = ""; },
            },
            zoom: {
              wheel:  { enabled: true },
              pinch:  { enabled: true },
              mode:   "x",
              onZoomComplete: () => { document.getElementById("btnResetZoom").style.display = ""; },
            },
          },
        },
        onClick: (_event, elements) => {
          if (!elements.length) { closeDayDetail(); return; }
          showDayDetail(chartAgrupado[keys[elements[0].index]]);
        },
      },
    });
  }

  function showDayDetail(data) {
    const titleEl = document.getElementById("dayDetailTitle");
    const listEl  = document.getElementById("dayDetailList");
    const cats    = CATEGORIAS.filter(c => data.cats[c] > 0).sort((a, b) => data.cats[b] - data.cats[a]);
    const total   = cats.reduce((s, c) => s + data.cats[c], 0);
    titleEl.textContent = `Detalle: ${data.displayLabel}`;
    listEl.innerHTML = cats.map(c =>
      `<div class="day-detail-item"><span class="day-detail-dot" style="background:${COLORES_CAT[c]}"></span>${c}: <strong>${fmtMonto(data.cats[c])}</strong></div>`
    ).join("") + `<div class="day-detail-total">Total: ${fmtMonto(total)}</div>`;
    document.getElementById("dayDetail").style.display = "";
  }

  function closeDayDetail() {
    document.getElementById("dayDetail").style.display = "none";
  }

  document.getElementById("periodoSelect").addEventListener("change", function () {
    renderChart(rowsGlobal, this.value);
  });

  // ── Formateo ─────────────────────────────────────────────
  function fmtMonto(val) {
    const n = parseFloat(val);
    if (isNaN(n)) return "-";
    return "$ " + n.toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtFecha(val) {
    if (!val) return "-";
    const s = String(val).substring(0, 10);
    const [y, m, d] = s.split("-");
    return `${d}/${m}/${y}`;
  }

  // ── Helpers mes ──────────────────────────────────────────
  function getMesesDisponibles(rows) {
    const set = new Set();
    rows.forEach(row => {
      const s = String(row["Fecha"] ?? "").substring(0, 7);
      if (s.length === 7) set.add(s);
    });
    return [...set].sort().reverse();
  }

  function poblarSelectorMes(selectId, meses) {
    const sel = document.getElementById(selectId);
    const prev = sel.value;
    const currentYM = new Date().toISOString().substring(0, 7);
    sel.innerHTML = "";
    meses.forEach(ym => {
      const [y, m] = ym.split("-");
      const opt = document.createElement("option");
      opt.value = ym;
      opt.textContent = `${MESES_LARGOS[+m - 1]} ${y}`;
      sel.appendChild(opt);
    });
    if (meses.includes(prev)) sel.value = prev;
    else if (meses.includes(currentYM)) sel.value = currentYM;
  }

  function rowsDelMes(rows, ym) {
    return rows.filter(row => String(row["Fecha"] ?? "").startsWith(ym));
  }

  // ── Total del mes ─────────────────────────────────────────
  function renderTotal(rows) {
    const ym = document.getElementById("totalMesSelect").value;
    const filtradas = rowsDelMes(rows, ym).filter(r => r["Categoría"] !== "Pago de Saldo");
    const total = filtradas.reduce((s, r) => s + (parseFloat(r["Monto Total"]) || 0), 0);
    const pagJoaco = filtradas.filter(r => r["Pagado por"] === "Joaco")
                              .reduce((s, r) => s + (parseFloat(r["Monto Total"]) || 0), 0);
    const pagAgus  = filtradas.filter(r => r["Pagado por"] === "Agus")
                              .reduce((s, r) => s + (parseFloat(r["Monto Total"]) || 0), 0);
    document.getElementById("totalMonto").textContent = fmtMonto(total);
    document.getElementById("totalJoaco").textContent = fmtMonto(pagJoaco);
    document.getElementById("totalAgus").textContent  = fmtMonto(pagAgus);
  }

  // ── Balance ───────────────────────────────────────────────
  let conciliarTimer  = null;
  let conciliarState  = null; // { ym, debtor, monto }

  function renderBalance(rows) {
    const ym        = document.getElementById("balanceMesSelect").value;
    const filtradas = rowsDelMes(rows, ym);

    const regulares   = filtradas.filter(r => r["Categoría"] !== "Pago de Saldo");
    const conciliadas = filtradas.filter(r => r["Categoría"] === "Pago de Saldo");

    const sum = (arr, pred) => arr.filter(pred).reduce((s, r) => s + (parseFloat(r["Monto Total"]) || 0), 0);

    const total    = sum(regulares, () => true);
    const pagJoaco = sum(regulares, r => r["Pagado por"] === "Joaco");
    const pagAgus  = sum(regulares, r => r["Pagado por"] === "Agus");
    const debJoaco = total * 0.70;
    const debAgus  = total * 0.30;

    // Conciliaciones: ajustan el "Pagó" de cada persona para reflejar los pagos de saldo
    const offsetJoaco = sum(conciliadas, r => r["Pagado por"] === "Joaco")
                      - sum(conciliadas, r => r["Pagado por"] === "Agus");
    const pagJoacoDisplay = pagJoaco + offsetJoaco;
    const pagAgusDisplay  = pagAgus  - offsetJoaco;
    const difJoaco = pagJoacoDisplay - debJoaco;

    document.getElementById("balTotalMes").textContent     = fmtMonto(total);
    document.getElementById("balJoacoPago").textContent    = fmtMonto(pagJoacoDisplay);
    document.getElementById("balJoacoDeberia").textContent = fmtMonto(debJoaco);
    document.getElementById("balAgusPago").textContent     = fmtMonto(pagAgusDisplay);
    document.getElementById("balAgusDeberia").textContent  = fmtMonto(debAgus);

    const difJEl = document.getElementById("balJoacoDif");
    difJEl.textContent = (difJoaco >= 0 ? "+" : "") + fmtMonto(difJoaco);
    difJEl.className   = "bal-dif " + (difJoaco >= 0 ? "favor" : "contra");

    const difAEl = document.getElementById("balAgusDif");
    difAEl.textContent = (difJoaco <= 0 ? "+" : "") + fmtMonto(-difJoaco);
    difAEl.className   = "bal-dif " + (difJoaco <= 0 ? "favor" : "contra");

    const res = document.getElementById("balResumen");
    const btn = document.getElementById("btnConciliar");
    resetConciliarBtn();

    if (total === 0 && conciliadas.length === 0) {
      res.textContent  = "Sin gastos en este período.";
      res.className    = "bal-resumen";
      btn.style.display = "none";
    } else if (Math.abs(difJoaco) < 0.01) {
      res.textContent  = "¡Están al día!";
      res.className    = "bal-resumen al-dia";
      btn.style.display = "none";
    } else if (difJoaco < 0) {
      const monto = Math.abs(difJoaco);
      res.innerHTML     = `Joaco le debe <strong>${fmtMonto(monto)}</strong> a Agus`;
      res.className     = "bal-resumen joaco-debe";
      btn.textContent   = `Conciliar: Joaco le paga ${fmtMonto(monto)} a Agus`;
      btn.style.display = "";
      conciliarState    = { ym, debtor: "Joaco", monto };
    } else {
      const monto = difJoaco;
      res.innerHTML     = `Agus le debe <strong>${fmtMonto(monto)}</strong> a Joaco`;
      res.className     = "bal-resumen agus-debe";
      btn.textContent   = `Conciliar: Agus le paga ${fmtMonto(monto)} a Joaco`;
      btn.style.display = "";
      conciliarState    = { ym, debtor: "Agus", monto };
    }
  }

  function resetConciliarBtn() {
    clearTimeout(conciliarTimer);
    const btn = document.getElementById("btnConciliar");
    btn.classList.remove("confirming");
    btn.disabled = false;
    if (conciliarState) btn.textContent = conciliarState.debtor === "Joaco"
      ? `Conciliar: Joaco le paga ${fmtMonto(conciliarState.monto)} a Agus`
      : `Conciliar: Agus le paga ${fmtMonto(conciliarState.monto)} a Joaco`;
  }

  document.getElementById("btnConciliar").addEventListener("click", async () => {
    const btn = document.getElementById("btnConciliar");
    if (!btn.classList.contains("confirming")) {
      btn.textContent = "¿Confirmar conciliación?";
      btn.classList.add("confirming");
      conciliarTimer = setTimeout(resetConciliarBtn, 3000);
      return;
    }
    clearTimeout(conciliarTimer);
    btn.disabled = true;

    const { ym, debtor, monto } = conciliarState;
    const [y, m] = ym.split("-");
    const lastDay = new Date(+y, +m, 0).getDate();
    const fecha   = `${ym}-${String(lastDay).padStart(2, "0")}`;
    const desc    = `Conciliación ${MESES_LARGOS[+m - 1]} ${y}`;

    await fetch(API_URL, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ fecha, descripcion: desc, categoria: "Pago de Saldo", monto, quien: debtor, token: API_TOKEN }),
    });

    setTimeout(cargarHistorial, 800);
  });

  // ── Historial ─────────────────────────────────────────────
  function renderHistorialFiltrado() {
    const ym = document.getElementById("historialMesSelect").value;
    renderTabla(ym ? rowsDelMes(rowsGlobal, ym) : rowsGlobal);
  }

  async function cargarHistorial() {
    const wrap = document.getElementById("tablaWrap");
    wrap.innerHTML = '<p class="estado-cargando">Cargando…</p>';
    try {
      const res  = await fetch(`${API_URL}?token=${API_TOKEN}`);
      const rows = await res.json();
      rowsGlobal = rows;
      const meses = getMesesDisponibles(rows);
      poblarSelectorMes("totalMesSelect",     meses);
      poblarSelectorMes("balanceMesSelect",   meses);
      poblarSelectorMes("historialMesSelect", meses);
      if (currentIdx === 1) renderChart(rows, document.getElementById("periodoSelect").value);
      renderHistorialFiltrado();
      renderTotal(rows);
      renderBalance(rows);
    } catch (err) {
      wrap.innerHTML = '<p class="estado-error">No se pudo cargar el historial.</p>';
    }
  }

  function renderTabla(rows) {
    const wrap = document.getElementById("tablaWrap");
    if (!rows.length) {
      wrap.innerHTML = '<p class="estado-vacio">Sin registros aún.</p>';
      return;
    }

    const cols = [
      { key: "Fecha",              label: "Fecha",          fmt: fmtFecha, num: false },
      { key: "Descripción",        label: "Descripción",    fmt: v => v,   num: false },
      { key: "Categoría",          label: "Categoría",      fmt: v => v,   num: false },
      { key: "Monto Total",        label: "Monto Total",    fmt: fmtMonto, num: true  },
      { key: "Pagado por",         label: "Pagado por",     fmt: v => v,   num: false },
      { key: "Mi parte",           label: "Joaco",       fmt: fmtMonto, num: true  },
      { key: "Parte otra persona", label: "Agus",        fmt: fmtMonto, num: true  },
    ];

    let html = "<table><thead><tr>";
    cols.forEach(c => { html += `<th>${c.label}</th>`; });
    html += "</tr></thead><tbody>";
    const rowMap = {};
    rows.forEach(row => { rowMap[row._row] = row; });

    rows.forEach(row => {
      const esConciliacion = row["Categoría"] === "Pago de Saldo";
      html += `<tr data-row="${row._row}"${esConciliacion ? ' class="conciliacion"' : ""}>`;
      cols.forEach(c => {
        const cls = c.num ? ' class="monto-num"' : "";
        const esParte = c.key === "Mi parte" || c.key === "Parte otra persona";
        const val = (esConciliacion && esParte) ? "—" : c.fmt(row[c.key] ?? "");
        html += `<td${cls}>${val}</td>`;
      });
      html += "</tr>";
    });
    html += "</tbody></table>";
    wrap.innerHTML = html;

    wrap.querySelectorAll("tbody tr").forEach(tr => {
      tr.addEventListener("click", () => openModal(rowMap[+tr.dataset.row]));
    });
  }

  // ── Modal edición / eliminación ───────────────────────────
  const overlay   = document.getElementById("modalOverlay");
  const btnDelete = document.getElementById("btnDelete");
  const btnSave   = document.getElementById("btnSave");
  let   editingRow = null;
  let   deleteConfirmTimer = null;

  function openModal(row) {
    editingRow = row;
    document.getElementById("editFecha").value       = String(row["Fecha"] ?? "").substring(0, 10);
    document.getElementById("editDescripcion").value = row["Descripción"] ?? "";
    document.getElementById("editCategoria").value   = row["Categoría"]   ?? "";
    document.getElementById("editMonto").value       = row["Monto Total"] ?? "";
    document.getElementById("editQuien").value       = row["Pagado por"]  ?? "";

    btnSave.disabled   = false;
    btnSave.textContent = "Guardar";
    resetDeleteBtn();
    btnSave.disabled    = false;
    btnSave.textContent = "Guardar";
    overlay.classList.add("open");
  }

  function closeModal() {
    overlay.classList.remove("open");
    editingRow = null;
    resetDeleteBtn();
  }

  function resetDeleteBtn() {
    clearTimeout(deleteConfirmTimer);
    btnDelete.textContent = "Eliminar";
    btnDelete.classList.remove("confirming");
  }

  document.getElementById("modalClose").addEventListener("click", closeModal);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

  // Eliminar (requiere doble toque para confirmar)
  btnDelete.addEventListener("click", async () => {
    if (!btnDelete.classList.contains("confirming")) {
      btnDelete.textContent = "¿Confirmar?";
      btnDelete.classList.add("confirming");
      deleteConfirmTimer = setTimeout(resetDeleteBtn, 3000);
      return;
    }
    resetDeleteBtn();
    btnDelete.disabled = true;
    btnSave.disabled   = true;
    try {
      const res = await fetch(API_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ action: "delete", _row: editingRow._row, token: API_TOKEN }),
      });
      if (!res.ok) throw new Error(`Error ${res.status}`);
      closeModal();
      setTimeout(cargarHistorial, 800);
    } catch (err) {
      btnDelete.disabled = false;
      btnSave.disabled   = false;
      alert(`No se pudo eliminar: ${err.message}`);
    }
  });

  // Guardar cambios
  document.getElementById("editForm").addEventListener("submit", async e => {
    e.preventDefault();
    if (!document.getElementById("editForm").checkValidity()) {
      document.getElementById("editForm").reportValidity();
      return;
    }
    btnSave.disabled   = true;
    btnDelete.disabled = true;
    btnSave.textContent = "Guardando…";
    try {
      const res = await fetch(API_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({
          action:      "update",
          _row:        editingRow._row,
          fecha:       document.getElementById("editFecha").value,
          descripcion: document.getElementById("editDescripcion").value.trim(),
          categoria:   document.getElementById("editCategoria").value,
          monto:       parseFloat(document.getElementById("editMonto").value),
          quien:       document.getElementById("editQuien").value,
          token:       API_TOKEN,
        }),
      });
      if (!res.ok) throw new Error(`Error ${res.status}`);
      closeModal();
      setTimeout(cargarHistorial, 800);
    } catch (err) {
      btnDelete.disabled = false;
      alert(`No se pudo guardar: ${err.message}`);
    } finally {
      btnSave.disabled    = false;
      btnSave.textContent = "Guardar";
    }
  });

  // ── Formulario nuevo gasto ────────────────────────────────
  document.getElementById("gastoForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const form = e.target;
    const btn  = document.getElementById("btnEnviar");
    const msg  = document.getElementById("mensaje");
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const data = {
      fecha:       document.getElementById("fecha").value,
      descripcion: document.getElementById("descripcion").value.trim(),
      categoria:   document.getElementById("categoria").value,
      monto:       parseFloat(document.getElementById("monto").value),
      quien:       document.getElementById("quien").value,
      token:       API_TOKEN,
    };
    btn.disabled = true; btn.textContent = "Enviando…";
    msg.className = ""; msg.style.display = "none";
    try {
      await fetch(API_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(data),
      });
      msg.textContent = "Gasto registrado correctamente.";
      msg.className   = "ok";
      form.reset();
      document.getElementById("fecha").valueAsDate = new Date();
      setTimeout(cargarHistorial, 1500);
    } catch {
      msg.textContent = "Error al enviar. Revisá tu conexión e intentá de nuevo.";
      msg.className   = "error";
    } finally {
      btn.disabled = false; btn.textContent = "Registrar gasto";
    }
  });

  document.getElementById("btnResetZoom").addEventListener("click", () => {
    if (chartInstance) chartInstance.resetZoom();
    document.getElementById("btnResetZoom").style.display = "none";
  });

  document.getElementById("dayDetailClose").addEventListener("click", closeDayDetail);

  document.getElementById("totalMesSelect").addEventListener("change",     () => renderTotal(rowsGlobal));
  document.getElementById("balanceMesSelect").addEventListener("change",   () => renderBalance(rowsGlobal));
  document.getElementById("historialMesSelect").addEventListener("change", renderHistorialFiltrado);
  document.getElementById("btnRecargar").addEventListener("click", cargarHistorial);

  cargarHistorial();
</script>
</body>
</html>
