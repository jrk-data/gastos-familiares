name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          custom_instructions: |
            This is a family expense tracker with no build step and no local backend.
            The frontend is a single file: index.html (HTML + CSS + JS all inline).
            The live app is deployed at https://jrk-data.github.io/gastos-familiares/ (GitHub Pages, auto-deploys from master).
            The backend is Google Apps Script (cloud-hosted) — it cannot be run locally.
            All data is stored in a Google Spreadsheet; you cannot query it from this environment.
            Use the mcp__playwright__ tools to open a browser and interact with the live app at the URL above.
            When editing code, only modify index.html (frontend) or apps-script/Code.gs (backend logic).
            Note: after pushing changes, GitHub Pages may take 1-2 minutes to reflect them.

          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--allowed-origins",
                    "jrk-data.github.io"
                  ]
                }
              }
            }

          allowed_tools: "Bash(git:*),Bash(gh:*),mcp__playwright__browser_navigate,mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_type,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_select_option,mcp__playwright__browser_wait_for,mcp__playwright__browser_close,mcp__playwright__browser_resize,mcp__playwright__browser_scroll,mcp__playwright__browser_evaluate"

